{% extends 'base.html' %}
{% block content %}

    <h1 class="mt-4 mb-4">TKO Item Tracking</h1>
        <div class="text-center">
       {% load static %}

            <!-- 2. Fill in the title bucket -->
{% block title %}Play the Quiz{% endblock %}

<!-- 3. Fill in the main content bucket with the form we wrote earlier -->
    <h3>Current Score: {{ score }}/5</h3>
    <hr>

<!--<form action="{% url 'index' %}" method="post">-->
<form method="post">
    {% csrf_token %}

    {% for choice in question.choices.all %}
        <!-- Wrapping the option in a styled container -->
        <div class="option-container">
            <label for="choice{{ forloop.counter }}">
                <input type="radio" name="choice" id="choice{{ forloop.counter }}" value="{{ choice.id }}">
                {{ forloop.counter }}. {{ choice.choice_text }}
            </label>
        </div>
    {% endfor %}

    <br>
    <button type="submit">Submit Answer</button>
</form>

</div>
    </form>
{% endblock content %}
