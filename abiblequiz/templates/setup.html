{% extends 'base.html' %}
{% block content %}

    <title>Quiz Setup</title>
    <style>body { font-family: sans-serif; margin: 40px; }</style>

    <h1>Welcome to the Quiz Game!</h1>
    <p>Please select your game options below:</p>

    <form method="POST">
        {% csrf_token %}

    <p>
    <label for="category">Choose a Category:</label>
    <select id="category" name="category">
        <!-- Add the "All" option here -->
        <option value="All">All Categories</option>
        {% for cat in categories %}
            <option value="{{ cat }}">{{ cat }}</option>
        {% endfor %}
    </select>
    </p>
    <p>
    <label for="difficulty">Choose Difficulty:</label>
    <select id="difficulty" name="difficulty">
        <!-- Add the "All" option here -->
        <option value="All">All Difficulties</option>
        {% for diff in difficulties %}
            <option value="{{ diff }}">{{ diff }}</option>
        {% endfor %}
    </select>
</p>

        <button type="submit" style="padding: 10px 20px; cursor: pointer;">Start Quiz! 🚀</button>
    </form>
{% endblock %}
