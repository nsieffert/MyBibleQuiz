{% extends 'base.html' %}
{% block content %}
<div class="text-center">
<h1 class="mt-4 mb-4">Submit Your Own Questions!</h1>
<p class="mt-4 mb-4">(Subject to review)</p>
</div>
        <div class="text-center">
       {% load static %}
        <img src="{% static 'images/questionmark.png' %}" style='width:35px' alt="Centered Image">
    <style>
     H1 {
        text-align: center;
     }
    H3 {
        padding: 2px;
    }
      {
         align-content: center;
     }

    </style>
</div>
    <form method="post">
    {% csrf_token %}
    <h3>*** Submission Form ***</h3>
        <div class="form-group mb-4">
            <label for="category">Category:</label>
            <input class="form-control" type="text" id="category" name="category">
        </div>
            <div class="form-group mb-4">
            <label for="difficulty">Difficulty Level:</label>
            <input class="form-control" type="text" id="difficulty" name="difficulty">
        </div>
            <div class="form-group mb-4">
            <label for="question_text">Question:</label>
            <input class="form-control" type="text" id="question_text" name="question_text">
        </div>
            <div class="form-group mb-4">
            <label for="option_a">Option A:</label>
            <input class="form-control" type="text" id="option_a" name="option_a">
        </div>
                    <div class="form-group mb-4">
            <label for="option_b">Option B:</label>
            <input class="form-control" type="text" id="option_b" name="option_b">
        </div>
                    <div class="form-group mb-4">
            <label for="option_c">Option C:</label>
            <input class="form-control" type="text" id="option_c" name="option_c">
        </div>
                    <div class="form-group mb-4">
            <label for="option_d">Option D:</label>
            <input class="form-control" type="text" id="option_d" name="option_d">
        </div>
                    <div class="form-group mb-4">
            <label for="correct_answer">Correct Answer:</label>
            <input class="form-control" type="text" id="correct_answer" name="correct_answer">
        </div>
                    <div class="form-group mb-4">
            <label for="reference">Reference:</label>
            <input class="form-control" type="text" id="reference" name="reference">
        </div>

       <button class ="btn btn-secondary mb-4" type="submit">Submit</button>
    {% if messages %}
    <div class="alert alert-warning" role="alert">
    {% for message in messages %}
    {{ message }}
    {% endfor %}
    </div>
    {% endif %}

    </form>

    {% endblock content %}
